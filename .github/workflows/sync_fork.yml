name: 'Fork Sync'
on:
  schedule:
    - cron: '20 3 * * *'
  workflow_dispatch:
    inputs:
      sync_test_mode:
        description: 'Use Test Mode?'
        type: boolean
        default: false

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_branch: main
          upstream_sync_repo: cmliu/edgetunnel
          test_mode: ${{ inputs.sync_test_mode }}

      - name: Generate wrangler.toml
        if: (steps.sync.outputs.has_new_commits == 'true' || github.event_name == 'workflow_dispatch') && inputs.sync_test_mode != true
        run: |
          cat > wrangler.toml << 'EOF'
          name = "fuck"
          main = "_worker.js"
          compatibility_date = "2025-11-04"
          [[kv_namespaces]]
          binding = "FUCK"
          id = "${{ vars.FUCK_KV_ID }}"
          [vars]
          ADMIN = "${{ secrets.ADMIN_PASSWORD }}"
          KEY = "${{ vars.UUID }}"
          UUID = "${{ vars.UUID }}"
          URL = "${{ vars.URL }}"
          EOF

      - name: Deploy to Cloudflare Workers
        if: (steps.sync.outputs.has_new_commits == 'true' || github.event_name == 'workflow_dispatch') && inputs.sync_test_mode != true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
